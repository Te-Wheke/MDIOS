    const canvas = document.getElementById('canvas');
    let currentFrame = 0;
    let playing = true;
    let loopsRemaining = Infinity;
    let timeout;
    
    function render() {
      const frame = frames[currentFrame];
      canvas.innerHTML = frame.lines.join('<br>');
    }
    
    function next() {
      if (!playing) return;
      render();
      currentFrame++;
      if (currentFrame >= frames.length) {
        currentFrame = 0;
        if (loopsRemaining !== Infinity) {
          loopsRemaining--;
          if (loopsRemaining <= 0) {
            playing = false;
            return;
          }
        }
      }
      timeout = setTimeout(next, frames[currentFrame - 1]?.duration || 100);
    }
    
    
    document.getElementById('playPause').onclick = () => {
      playing = !playing;
      document.getElementById('playPause').textContent = playing ? 'Pause' : 'Play';
      if (playing) next();
    };
    document.getElementById('restart').onclick = () => {
      currentFrame = 0;
      loopsRemaining = Infinity;
      playing = true;
      document.getElementById('playPause').textContent = 'Pause';
      clearTimeout(timeout);
      next();
    };
    
    
    next();
